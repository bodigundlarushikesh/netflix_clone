<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>404 | StreamFlix</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
        href="css/style.css">

    <link rel="stylesheet"
        href="css/components.css">

    <link rel="stylesheet"
        href="css/animations.css">

</head>

<body
    class="bg-black text-white font-[Poppins]">

    <main
        class="min-h-screen flex items-center justify-center px-6">

        <div
            class="text-center fade-up">

            <h1
                class="text-[8rem] md:text-[12rem] font-extrabold text-red-600 leading-none">

                404

            </h1>

            <h2
                class="text-4xl font-bold mt-6">

                Page Not Found

            </h2>

            <p
                class="text-gray-400 mt-6 max-w-xl mx-auto leading-8">

                The page you're looking for doesn't exist or may have been moved.

            </p>

            <div
                class="flex flex-wrap justify-center gap-4 mt-10">

                <a
                    href="index.html"
                    class="btn btn-primary">

                    <i class="fas fa-house"></i>

                    Home

                </a>

                <button

                    onclick="history.back()"

                    class="btn btn-secondary">

                    <i class="fas fa-arrow-left"></i>

                    Go Back

                </button>

            </div>

        </div>

    </main>

</body>

</html>
