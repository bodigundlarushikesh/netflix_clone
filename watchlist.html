<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>StreamFlix | My Watchlist</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body class="bg-black text-white font-[Poppins]">

    <!-- =========================
            NAVBAR
    ========================== -->

    <header
        id="navbar"
        class="fixed top-0 left-0 w-full bg-black/80 backdrop-blur-md z-50">

        <div
            class="max-w-7xl mx-auto h-20 px-6 flex items-center justify-between">

            <a href="index.html">

                <h1
                    class="text-4xl font-bold text-red-600">

                    StreamFlix

                </h1>

            </a>

            <div
                class="flex items-center gap-6">

                <a
                    href="index.html"
                    class="hover:text-red-500">

                    Home

                </a>

                <a
                    href="search.html"
                    class="hover:text-red-500">

                    Search

                </a>

                <a
                    href="profile.html"
                    class="hover:text-red-500">

                    Profile

                </a>

            </div>

        </div>

    </header>

    <!-- =========================
            PAGE HEADER
    ========================== -->

    <section
        class="pt-32 pb-10 px-6">

        <div
            class="max-w-7xl mx-auto">

            <h1
                class="text-5xl font-bold">

                ❤️ My Watchlist

            </h1>

            <p
                class="text-gray-400 mt-4">

                Save your favorite movies and TV shows.

            </p>

        </div>

    </section>

    <!-- =========================
            WATCHLIST GRID
    ========================== -->

    <section
        class="pb-20 px-6">

        <div
            class="max-w-7xl mx-auto">

            <div

                id="watchlistContainer"

                class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">

            </div>

            <div

                id="emptyWatchlist"

                class="hidden text-center py-20">

                <i
                    class="fas fa-heart-broken text-7xl text-gray-600 mb-6">

                </i>

                <h2
                    class="text-3xl font-bold">

                    Your Watchlist is Empty

                </h2>

                <p
                    class="text-gray-400 mt-4">

                    Start adding movies you love.

                </p>

                <a

                    href="index.html"

                    class="inline-block mt-8 bg-red-600 hover:bg-red-700 px-8 py-3 rounded-lg">

                    Browse Movies

                </a>

            </div>

        </div>

    </section>
        <!-- =========================
            CLEAR WATCHLIST MODAL
    ========================== -->

    <div

        id="clearModal"

        class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center px-6">

        <div
            class="bg-neutral-900 rounded-xl p-8 max-w-md w-full">

            <h2
                class="text-2xl font-bold">

                Clear Watchlist?

            </h2>

            <p
                class="text-gray-400 mt-4">

                This action cannot be undone.

            </p>

            <div
                class="flex justify-end gap-4 mt-8">

                <button

                    id="cancelClear"

                    class="px-6 py-3 bg-neutral-700 rounded-lg hover:bg-neutral-600">

                    Cancel

                </button>

                <button

                    id="confirmClear"

                    class="px-6 py-3 bg-red-600 rounded-lg hover:bg-red-700">

                    Clear

                </button>

            </div>

        </div>

    </div>

    <!-- =========================
            FOOTER
    ========================== -->

    <footer
        class="bg-neutral-950 mt-20">

        <div
            class="max-w-7xl mx-auto px-6 py-12">

            <div
                class="flex flex-col md:flex-row items-center justify-between gap-6">

                <h2
                    class="text-3xl font-bold text-red-600">

                    StreamFlix

                </h2>

                <div
                    class="flex gap-6 text-2xl">

                    <i class="fab fa-facebook hover:text-red-500 transition"></i>

                    <i class="fab fa-instagram hover:text-red-500 transition"></i>

                    <i class="fab fa-x-twitter hover:text-red-500 transition"></i>

                    <i class="fab fa-youtube hover:text-red-500 transition"></i>

                </div>

            </div>

            <div
                class="border-t border-neutral-800 mt-8 pt-6 text-center text-gray-500">

                © 2026 StreamFlix. All Rights Reserved.

            </div>

        </div>

    </footer>

    <!-- =========================
            SCRIPTS
    ========================== -->

    <script src="js/watchlist.js"></script>

</body>

</html>
